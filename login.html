<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>LOGIN</title>
  <style>
  *{
    margin:0;
    padding:0;
    -webkit-tap-highlight-color: transparent;
    outline:none;

    
  }
  body{ 
  8]
    background: radial-gradient(circle, #ab0bef 0%, #0487f9 100%);
    color:rgba(255,255,255,0.9);
    text-align:center;
    height: 100vh;
    }
  .page {
  transition: opacity 0.5s ease;
  opacity: 1;
}

.fade-out {
  opacity: 0;
}
  h1{
    margin:25px auto;
    font-size:40px;
  }
  #formular{
   
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border:2px solid white;
    border-radius:20px;
    max-width:70%;
    margin: 50px auto;
    height:70vh;
    max-height:80vh;
   box-shadow: 5px -5px 25px white;
  }
  #form{ 
    
    display: flex;
    flex-direction: column;
    gap:1rem;
    
     /* Espace entre les champs */
}
  input{
    width:75%;
    height:2.5rem;
    margin:8px auto;
    border:2px solid #00008b;
    border-radius:10px;
    transition:1s;
    font-size:20px
  }
  
  input::placeholder{
    padding-left: 15px;
    font-size:15px
}
  input:hover,
input:focus ,
input:active{
      background:#a62cf7  ;
    color:white;
    border:2px solid white;
    border-radius:10px;
    width:72%;
   box-shadow: 5px -5px 25px white;


  }
 input:hover::placeholder,
input:focus ::placeholder,
input:active::placeholder{
      color:white;
      font-weight:bold;
      font-size:20px

}

  #btn{
    width:60%;
    height:50px;
    margin:20px auto;
    border-radius:10px;
    border:2px solid white;
    background:#d921ea;
    color:white;
    font-size:20px;
    transition:1s;
 

  }
  #btn:hover,
  #btn:focus,
  #btn:active {
    width:58%;
    height:45px;
    border-radius:10px;
    border:2px solid #db03db;
    background:#f4f5f6;
    color:#db03db;
    font-weight:bold


  }
  p{
   font-size:25px

  }
  #signinLink{
    color:white;
    
  }
  
  
  
  </style>
</head>
<body class="page">
  <div id="formular">
    <h1>login</h1>
    <form id="form">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="pwd" placeholder="Password">
  
      <button type="submit" id="btn">Connect</button>
 
    </form>
    <p>You don't have account? <a id="signinLink" href="sign_in.html">Sign in</a></p>
      
    
    
    
    <script>
    
    const signinLink = document.getElementById("signinLink");

signinLink.addEventListener("click", (e) => {
  e.preventDefault();
  document.body.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = "sign_in.html";
  },1000);

});
    
    </script>  
  </div>
</body>
</html>
